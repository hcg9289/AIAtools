services:
  ppt_generator:
    build: .
    container_name: ppt_generator
    # Level 3: Property Lockdown - UID 1008 non-root user
    user: "1008:1008"
    # Level 2: Instruction Lockdown
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1gb
    # Level 1: Skeleton - healthcheck
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5008/health', timeout=5)"]
      interval: 60s
      timeout: 8s
      retries: 1
      start_period: 60s
    ports:
      - '127.0.0.1:5008:5008'
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      - ../finance_vault/data/1008_ppt_generator:/app/data/1008_ppt_generator:ro
    environment:
      - VAULT_AI_URL=http://wa-vault-1006:5001
      - VAULT_AUTH_URL=http://wa-vault-1006:5001/api/v1/token/validate
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - FRONTEND_SLIDES_TEXT_MODEL=${FRONTEND_SLIDES_TEXT_MODEL:-google/gemini-3.1-flash-lite}
      - FRONTEND_SLIDES_VISION_MODEL=${FRONTEND_SLIDES_VISION_MODEL:-google/gemini-3.1-flash-lite}
      - APP_INTERNAL_BASE_URL=http://127.0.0.1:5008
      - CHROME_EXECUTABLE_PATH=/usr/bin/chromium
    restart: unless-stopped
    networks:
      - VPS-net

networks:
  VPS-net:
    external: true
