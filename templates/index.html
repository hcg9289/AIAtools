<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIAtools</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f4f1ea;
            --surface: #fffdf7;
            --surface-2: #ece6d8;
            --ink: #1d2521;
            --muted: #68736d;
            --line: #d7cdb9;
            --focus: #0f766e;
            --accent: #b7791f;
            --success: #157347;
            --shadow: 0 20px 60px rgba(46, 35, 17, 0.12);
        }

        body {
            min-height: 100vh;
            font-family: "Noto Serif TC", "Microsoft JhengHei", "PingFang TC", serif;
            background:
                linear-gradient(135deg, rgba(183,121,31,0.12), transparent 34%),
                linear-gradient(225deg, rgba(15,118,110,0.10), transparent 38%),
                var(--bg);
            color: var(--ink);
            padding: 28px 18px;
        }

        .shell {
            width: min(1120px, 100%);
            margin: 0 auto;
            display: grid;
            grid-template-columns: 0.9fr 1.1fr;
            gap: 22px;
            align-items: stretch;
        }

        .brand {
            min-height: 620px;
            padding: 34px;
            border: 1px solid var(--line);
            background: linear-gradient(160deg, #1f2a25 0%, #263b35 52%, #b7791f 140%);
            color: #fff8ea;
            box-shadow: var(--shadow);
            position: sticky;
            top: 24px;
            overflow: hidden;
        }

        .brand::after {
            content: "";
            position: absolute;
            left: 34px;
            right: 34px;
            bottom: 112px;
            height: 1px;
            background: rgba(255,255,255,0.28);
        }

        .eyebrow {
            font-size: 12px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: rgba(255,248,234,0.7);
            margin-bottom: 86px;
        }

        h1 {
            font-size: clamp(44px, 7vw, 82px);
            line-height: 0.92;
            letter-spacing: 0;
            max-width: 8ch;
            margin-bottom: 24px;
        }

        .brand p {
            width: min(360px, 100%);
            color: rgba(255,248,234,0.76);
            font-size: 16px;
            line-height: 1.75;
        }

        .brand-mark {
            position: absolute;
            bottom: 32px;
            left: 34px;
            right: 34px;
            display: flex;
            justify-content: space-between;
            gap: 16px;
            color: rgba(255,248,234,0.74);
            font-size: 13px;
        }

        .panel {
            background: rgba(255,253,247,0.92);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            padding: 28px;
            min-height: 620px;
        }

        .section-title {
            font-size: 15px;
            color: var(--muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 22px;
        }

        .tool-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 18px;
        }

        .tool-card {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 18px;
            align-items: center;
            padding: 24px;
            border: 1px solid var(--line);
            background: var(--surface);
            text-decoration: none;
            color: var(--ink);
            transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease;
        }

        .tool-card:hover, .tool-card:focus {
            transform: translateY(-2px);
            border-color: var(--focus);
            box-shadow: 0 18px 36px rgba(46, 35, 17, 0.10);
            outline: none;
        }

        .tool-kicker {
            font: 700 12px "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--focus);
            margin-bottom: 12px;
        }

        .tool-card h2 {
            font-size: clamp(26px, 4vw, 42px);
            line-height: 1.1;
            letter-spacing: 0;
            margin-bottom: 14px;
        }

        .tool-card p {
            font: 500 15px/1.75 "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            color: var(--muted);
            max-width: 520px;
        }

        .tool-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 18px;
        }

        .pill {
            border: 1px solid var(--line);
            background: var(--surface-2);
            color: var(--ink);
            font: 700 12px "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            padding: 8px 10px;
        }

        .start {
            min-width: 128px;
            height: 52px;
            display: inline-grid;
            place-items: center;
            background: var(--ink);
            color: #fffaf0;
            font: 800 15px "Noto Sans TC", "Microsoft JhengHei", sans-serif;
        }

        .note {
            margin-top: 22px;
            padding: 18px;
            border: 1px solid var(--line);
            background: var(--surface-2);
            color: var(--muted);
            font: 600 14px/1.7 "Noto Sans TC", "Microsoft JhengHei", sans-serif;
        }

        @media (max-width: 820px) {
            body { padding: 14px; }
            .shell { grid-template-columns: 1fr; }
            .brand { min-height: 340px; position: relative; top: auto; }
            .eyebrow { margin-bottom: 42px; }
            .panel { min-height: auto; }
            .tool-card { grid-template-columns: 1fr; }
            .start { width: 100%; }
        }
    </style>
</head>
<body>
<main class="shell">
    <section class="brand">
        <div class="eyebrow">1008 AIAtools</div>
        <h1>選擇工具</h1>
        <p>這裡是 AIAtools 的工具入口。取得 WhatsApp 專屬連結後，可以在同一個 session 內選擇需要使用的工具。</p>
        <div class="brand-mark">
            <span>Secure OTT Session</span>
            <span>20 Minutes</span>
        </div>
    </section>

    <section class="panel" aria-labelledby="tools-heading">
        <div class="section-title">Available Tools</div>
        <div class="tool-grid">
            <a class="tool-card" href="/tools/gf" aria-label="開始製作 GF 計劃簡報">
                <div>
                    <div class="tool-kicker">GF Finalizer</div>
                    <h2 id="tools-heading">GF 計劃簡報</h2>
                    <p>上傳 GF 建議書，自動抽取指定表格、替換數字與姓名，生成已填好的 PPTX / PDF。</p>
                    <div class="tool-meta">
                        <span class="pill">固定模板</span>
                        <span class="pill">PPTX / PDF</span>
                        <span class="pill">局部截圖</span>
                    </div>
                </div>
                <span class="start">開始製作</span>
            </a>
        </div>

        <div class="note">更多工具將陸續加入。現階段先保留原有子網域，待主頁穩定後再處理品牌子網域改名。</div>
    </section>
</main>
</body>
</html>
