<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GF Finalizer</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f4f1ea;
            --surface: #fffdf7;
            --surface-2: #ece6d8;
            --ink: #1d2521;
            --muted: #68736d;
            --line: #d7cdb9;
            --field: #fbf8f0;
            --focus: #0f766e;
            --accent: #b7791f;
            --accent-2: #0f766e;
            --danger: #b42318;
            --success: #157347;
            --shadow: 0 20px 60px rgba(46, 35, 17, 0.12);
        }

        body {
            min-height: 100vh;
            font-family: "Noto Serif TC", "Microsoft JhengHei", "PingFang TC", serif;
            background:
                linear-gradient(135deg, rgba(183,121,31,0.14), transparent 34%),
                linear-gradient(225deg, rgba(15,118,110,0.12), transparent 38%),
                var(--bg);
            color: var(--ink);
            padding: 28px 18px;
        }

        .shell {
            width: min(980px, 100%);
            margin: 0 auto;
            display: grid;
            grid-template-columns: 0.92fr 1.08fr;
            gap: 22px;
            align-items: start;
        }

        .brand {
            min-height: 620px;
            padding: 34px;
            border: 1px solid var(--line);
            background: linear-gradient(160deg, #1f2a25 0%, #263b35 52%, #b7791f 140%);
            color: #fff8ea;
            box-shadow: var(--shadow);
            position: sticky;
            top: 24px;
            overflow: hidden;
        }

        .brand::after {
            content: "";
            position: absolute;
            left: 34px;
            right: 34px;
            bottom: 110px;
            height: 1px;
            background: rgba(255,255,255,0.28);
        }

        .eyebrow {
            font-size: 12px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: rgba(255,248,234,0.7);
            margin-bottom: 96px;
        }

        h1 {
            font-size: clamp(42px, 7vw, 74px);
            line-height: 0.92;
            letter-spacing: 0;
            max-width: 7ch;
            margin-bottom: 24px;
        }

        .brand p {
            width: min(320px, 100%);
            color: rgba(255,248,234,0.76);
            font-size: 16px;
            line-height: 1.75;
        }

        .brand-mark {
            position: absolute;
            bottom: 32px;
            left: 34px;
            right: 34px;
            display: flex;
            justify-content: space-between;
            gap: 16px;
            color: rgba(255,248,234,0.74);
            font-size: 13px;
        }

        .panel {
            background: rgba(255,253,247,0.92);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            padding: 28px;
        }

        .section-title {
            font-size: 15px;
            color: var(--muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 22px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .field {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 8px;
        }

        input[type="text"], select {
            width: 100%;
            height: 48px;
            border: 1px solid var(--line);
            background: var(--field);
            color: var(--ink);
            font: 600 15px "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            padding: 0 14px;
            outline: none;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--focus);
            box-shadow: 0 0 0 3px rgba(15,118,110,0.16);
        }

        .upload {
            border: 1.5px dashed #b8a98f;
            background: var(--surface-2);
            min-height: 170px;
            display: grid;
            place-items: center;
            text-align: center;
            padding: 24px;
            cursor: pointer;
            transition: border-color .18s ease, background .18s ease, transform .18s ease;
        }

        .upload:hover, .upload.dragover {
            border-color: var(--accent-2);
            background: #e2eee8;
            transform: translateY(-1px);
        }

        .upload input { display: none; }
        .upload-title { font: 700 18px "Noto Sans TC", "Microsoft JhengHei", sans-serif; }
        .upload-hint { color: var(--muted); margin-top: 8px; font-size: 13px; }
        .file-name {
            margin-top: 12px;
            color: var(--accent-2);
            font: 700 13px "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            word-break: break-word;
        }

        .actions {
            margin-top: 22px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        button {
            height: 52px;
            border: 0;
            background: var(--ink);
            color: #fffaf0;
            font: 700 15px "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            cursor: pointer;
            transition: transform .16s ease, opacity .16s ease, background .16s ease;
        }

        button:hover:not(:disabled) {
            transform: translateY(-1px);
            background: #0f766e;
        }

        button:disabled {
            opacity: .48;
            cursor: not-allowed;
        }

        .status {
            display: none;
            margin-top: 18px;
            padding: 16px;
            border: 1px solid var(--line);
            background: #fffaf0;
            font: 600 14px "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            line-height: 1.6;
        }

        .status.success { border-color: rgba(21,115,71,0.35); color: var(--success); }
        .status.error { border-color: rgba(180,35,24,0.32); color: var(--danger); }
        .status a { color: inherit; font-weight: 800; }

        .spinner {
            display: none;
            width: 28px;
            height: 28px;
            border: 3px solid rgba(15,118,110,0.18);
            border-top-color: var(--accent-2);
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin: 18px auto 0;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 820px) {
            body { padding: 14px; }
            .shell { grid-template-columns: 1fr; }
            .brand { min-height: 330px; position: relative; top: auto; }
            .eyebrow { margin-bottom: 46px; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<main class="shell">
    <section class="brand">
        <div class="eyebrow">1008 GF Finalizer</div>
        <h1>GF 計劃 PPT</h1>
        <p>輸入客人與 Agent 資料，上傳 GF 建議書 PDF，系統會按固定最終版模板替換數字、局部截圖與標記。</p>
        <div class="brand-mark">
            <span>Fixed Template</span>
            <span>No AI Design</span>
        </div>
    </section>

    <section class="panel">
        <div class="section-title">Client Setup</div>
        <div class="grid">
            <div class="field">
                <label for="client-name">客人名</label>
                <input id="client-name" type="text" autocomplete="name" placeholder="例如：Mr. Chan">
            </div>
            <div class="field">
                <label for="agent-name">Agent 名</label>
                <input id="agent-name" type="text" autocomplete="name" placeholder="例如：Henry Chu">
            </div>
        </div>

        <div class="field">
            <label for="withdrawal-mode">提款例子</label>
            <select id="withdrawal-mode">
                <option value="auto">系統判斷</option>
                <option value="yes">有提款例子</option>
                <option value="no">沒有提款例子</option>
            </select>
        </div>

        <div class="field">
            <label>GF 建議書 PDF</label>
            <div class="upload" id="drop-zone">
                <input type="file" id="file-input" accept=".pdf,application/pdf">
                <div>
                    <div class="upload-title">拖曳 PDF 到這裡，或點擊選擇</div>
                    <div class="upload-hint">只接受 GF 建議書 PDF</div>
                    <div class="file-name" id="file-name"></div>
                </div>
            </div>
        </div>

        <div class="actions">
            <button id="generate-btn">生成 GF PPT</button>
        </div>

        <div class="spinner" id="spinner"></div>
        <div class="status success" id="result"></div>
        <div class="status error" id="error"></div>
    </section>
</main>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const fileName = document.getElementById('file-name');
    const generateBtn = document.getElementById('generate-btn');
    const spinner = document.getElementById('spinner');
    const resultBox = document.getElementById('result');
    const errorBox = document.getElementById('error');
    let proposalFile = null;
    let pingInterval = null;

    function startPing() {
        if (pingInterval) return;
        pingInterval = setInterval(() => fetch('/api/ping').catch(() => {}), 60000);
    }

    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    function setFile(file) {
        if (!file) return;
        const ext = file.name.split('.').pop().toLowerCase();
        if (ext !== 'pdf') {
            showError('請上傳 PDF 格式的 GF 建議書。');
            return;
        }
        proposalFile = file;
        fileName.textContent = file.name;
        hideMessages();
    }

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', event => setFile(event.target.files[0]));
    dropZone.addEventListener('dragover', event => {
        event.preventDefault();
        dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', event => {
        event.preventDefault();
        dropZone.classList.remove('dragover');
        setFile(event.dataTransfer.files[0]);
    });

    async function pollTask(taskId) {
        const deadline = Date.now() + 240000;
        while (Date.now() < deadline) {
            await sleep(2500);
            const resp = await fetch(`/api/task/${taskId}`);
            const data = await resp.json();
            if (data.status === 'done') return data;
            if (data.status === 'error') throw new Error(data.error || 'GF PPT 生成失敗。');
            if (data.status === 'not_found') throw new Error('任務已過期，請重新提交。');
        }
        throw new Error('生成逾時，請稍後重試。');
    }

    generateBtn.addEventListener('click', async () => {
        const clientName = document.getElementById('client-name').value.trim();
        const agentName = document.getElementById('agent-name').value.trim();
        const withdrawalMode = document.getElementById('withdrawal-mode').value;

        if (!clientName) return showError('請輸入客人名。');
        if (!agentName) return showError('請輸入 Agent 名。');
        if (!proposalFile) return showError('請上傳 GF 建議書 PDF。');

        hideMessages();
        setLoading(true);

        const formData = new FormData();
        formData.append('client_name', clientName);
        formData.append('agent_name', agentName);
        formData.append('withdrawal_mode', withdrawalMode);
        formData.append('proposal_pdf', proposalFile);

        try {
            const resp = await fetch('/api/gf/generate', { method: 'POST', body: formData });
            const contentType = (resp.headers.get('content-type') || '').toLowerCase();
            if (!contentType.includes('application/json')) {
                const raw = await resp.text();
                throw new Error(`伺服器回應格式異常，請重新進入連結後再試。回應摘要：${raw.replace(/\s+/g, ' ').slice(0, 120)}`);
            }
            const init = await resp.json();
            if (!resp.ok) throw new Error(init.error || '無法建立 GF 任務。');
            const result = await pollTask(init.task_id);
            showResult(result.download_url);
        } catch (error) {
            showError(error.message || 'GF PPT 生成失敗。');
        } finally {
            setLoading(false);
        }
    });

    function setLoading(on) {
        generateBtn.disabled = on;
        generateBtn.textContent = on ? '生成中...' : '生成 GF PPT';
        spinner.style.display = on ? 'block' : 'none';
    }

    function hideMessages() {
        resultBox.style.display = 'none';
        errorBox.style.display = 'none';
    }

    function showResult(url) {
        resultBox.innerHTML = `GF PPT 已生成。<a href="${url}" target="_blank">下載 .pptx</a>`;
        resultBox.style.display = 'block';
    }

    function showError(message) {
        errorBox.textContent = message;
        errorBox.style.display = 'block';
        resultBox.style.display = 'none';
    }

    startPing();
</script>
</body>
</html>
